<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="application-name" content="%VITE_APP_NAME%" />

    <meta name="apple-mobile-web-app-title" content="%VITE_APP_NAME%" />

    <link

    <link rel="mask-icon" href="/img/safari-pinned-tab.svg" color="#0f1118" />

    <meta name="msapplication-TileColor" content="#0f1118" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="%VITE_APP_URL%/" />
    <meta name="twitter:title" content="%VITE_APP_NAME%" />
    <meta name="twitter:description" content="%VITE_APP_SLOGAN%" />
    <meta
      name="twitter:image"
      content="%VITE_APP_URL%/img/screenshot-wide.png"
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "%VITE_APP_NAME%",
        "description": "%VITE_APP_SLOGAN%",
        "url": "%VITE_APP_URL%",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isRelatedTo": [
          {
            "@type": "SoftwareApplication",
            "name": "MoonBar",
            "description": "Moon phase in your browser toolbar.",
            "applicationCategory": "BrowserApplication",
            "operatingSystem": "Chrome",
            "url": "https://chromewebstore.google.com/detail/moonbar-moon-phase-in-you/nggjihigdfdcdapndddbcokfcdcgdaok",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
          },
          {
            "@type": "SoftwareApplication",
            "name": "MoonTab",
            "description": "Moon phase on every new tab.",
            "applicationCategory": "BrowserApplication",
            "operatingSystem": "Chrome",
            "url": "https://chromewebstore.google.com/detail/moontab-moon-phase-on-eve/hhfkcegnckjfijmciglgpgmmnbmikkmd",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
          }
        ]
      }
    </script>
    <style>
      :root {
        --bg: #0f1118;
        --panel: #1b1f2b;
        --text: #eef0f6;
        --muted: #8a90a0;
        --accent: #cdd4ea;
        --line: #2a2f3e;
      }
      * {
        box-sizing: border-box;
        margin: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        color: var(--text);
        font:
          15px/1.45 -apple-system,
          'Segoe UI',
          Roboto,
          Arial,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        background:
          radial-gradient(
            120% 80% at 50% -10%,
            #20263a 0%,
            rgba(32, 38, 58, 0) 60%
          ),
          var(--bg);
      }

      /* The moon card, centered in the viewport. */
      .card {
        width: 340px;
        max-width: 100%;
      }

      .moon-wrap {
        display: flex;
        justify-content: center;
      }
      .moon-wrap svg {
        display: block;
        filter: drop-shadow(0 4px 22px rgba(0, 0, 0, 0.55));
      }
      .phase {
        text-align: center;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.01em;
        margin-top: 22px;
      }
      .illum {
        text-align: center;
        color: var(--muted);
        font-size: 14px;
        margin-top: 5px;
      }
      .next {
        margin-top: 26px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .next-label {
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .next-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin-top: 5px;
      }
      .next-name {
        font-size: 17px;
        font-weight: 600;
      }
      .next-when {
        color: var(--accent);
        font-size: 14px;
        white-space: nowrap;
      }
      .next-rel {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }
      .other {
        margin-top: 11px;
        padding-top: 11px;
        border-top: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 12px;
      }
      .extensions {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        padding: 0 16px;
      }
      .extensions a {
        color: var(--accent);
        text-decoration: none;
      }
      .extensions a:hover,
      .extensions a:focus-visible {
        text-decoration: underline;
      }
      .extensions .sep {
        margin: 0 3px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="moon-wrap" id="moonWrap"></div>
      <div class="phase" id="phase">...</div>
      <div class="illum" id="illum"></div>

      <div class="next">
        <div class="next-label">Next event</div>
        <div class="next-row">
          <span class="next-name" id="nextName">-</span>
          <span class="next-when" id="nextWhen"></span>
        </div>
        <div class="next-rel" id="nextRel"></div>
        <div class="other" id="other" hidden>
          <span id="otherName"></span>
          <span id="otherWhen"></span>
        </div>
      </div>
    </main>

    <footer class="extensions">
      Also available as Chrome extensions:
      <a
        href="https://chromewebstore.google.com/detail/moonbar-moon-phase-in-you/nggjihigdfdcdapndddbcokfcdcgdaok"
        target="_blank"
        rel="noopener"
        >MoonBar</a
      >
      <span class="sep">&amp;</span>
      <a
        href="https://chromewebstore.google.com/detail/moontab-moon-phase-on-eve/hhfkcegnckjfijmciglgpgmmnbmikkmd"
        target="_blank"
        rel="noopener"
        >MoonTab</a
      >
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
